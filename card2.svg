<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 200" width="390" height="200">
  <style>
    .font-mono { font-family: 'Courier New', Courier, monospace; }
    .label { font-size: 10px; font-weight: bold; letter-spacing: 2px; }
    .title { font-size: 15px; font-weight: bold; fill: #f0f6fc; }
    .desc { font-size: 12px; fill: #8b949e; }
    .tag-text { font-size: 10px; font-weight: bold; }
  </style>
  <rect width="390" height="200" fill="#0d1117" rx="0"/>
  <rect width="386" height="196" x="2" y="2" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="2" y="10" width="3" height="178" fill="#e3b341"/>
  <text x="18" y="30" fill="#e3b341" class="font-mono label">30+ USERS ↗</text>
  <text x="18" y="52" class="font-mono title">AI Form Helper</text>
  <text x="18" y="72" class="font-mono desc">
    <tspan x="18" dy="0">Chrome extension with Groq API + LLaMA 3.3</tspan>
    <tspan x="18" dy="16">70B. 30+ organic Web Store installs.</tspan>
    <tspan x="18" dy="16">Zero server cost — pure edge inference.</tspan>
  </text>
  <g transform="translate(18, 148)">
    <rect width="68" height="22" rx="4" fill="#e3b341" fill-opacity="0.1" stroke="#e3b341" stroke-opacity="0.3"/>
    <text x="34" y="15" fill="#e3b341" class="font-mono tag-text" text-anchor="middle">Groq API</text>
  </g>
  <g transform="translate(93, 148)">
    <rect width="75" height="22" rx="4" fill="#e3b341" fill-opacity="0.1" stroke="#e3b341" stroke-opacity="0.3"/>
    <text x="37.5" y="15" fill="#e3b341" class="font-mono tag-text" text-anchor="middle">LLaMA 3.3</text>
  </g>
  <g transform="translate(175, 148)">
    <rect width="82" height="22" rx="4" fill="#e3b341" fill-opacity="0.1" stroke="#e3b341" stroke-opacity="0.3"/>
    <text x="41" y="15" fill="#e3b341" class="font-mono tag-text" text-anchor="middle">TypeScript</text>
  </g>
</svg>
